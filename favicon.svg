<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="lg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="#04091a"/>
  <!-- Grid -->
  <line x1="4" y1="10" x2="28" y2="10" stroke="#0d2040" stroke-width="0.7"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#0d2040" stroke-width="0.7"/>
  <line x1="4" y1="22" x2="28" y2="22" stroke="#0d2040" stroke-width="0.7"/>
  <!-- Candlestick (red = bull, TW) -->
  <line x1="16" y1="7"  x2="16" y2="10" stroke="#e53935" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="12.5" y="10" width="7" height="11.5" fill="#e53935"/>
  <line x1="16" y1="21.5" x2="16" y2="25" stroke="#e53935" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Signal line -->
  <polyline points="3.5,26.5 10,21 16,16 22,11.5 28.5,7"
    fill="none" stroke="url(#lg)" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>
  <!-- Endpoint dot -->
  <circle cx="28.5" cy="7" r="1.8" fill="#00d2ff" filter="url(#glow)"/>
</svg>
