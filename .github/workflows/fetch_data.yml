name: Fetch Market Data

on:
  schedule:
    # Every 30 min on weekdays during Taiwan market hours (01:00-09:30 UTC = 09:00-17:30 TST)
    - cron: '*/30 1-9 * * 1-5'
    # Pre-market update (22:00 UTC Sun–Fri = 06:00 TST Mon–Sat)
    # Mon-Fri: captures prior night's US close (20:00-21:00 UTC) before Taiwan open
    # Sat: captures Friday US close for weekend viewers
    - cron: '0 22 * * 0-5'
    # Friday Taiwan post-market (10:00 UTC Fri = 18:00 TST) — institutional data etc.
    - cron: '0 10 * * 5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  actions: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data
        run: python scripts/fetch_data.py

      - name: Commit and push data
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/market_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update market data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy_pages.yml --ref main
