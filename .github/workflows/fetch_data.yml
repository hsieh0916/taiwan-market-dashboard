name: Fetch Market Data

on:
  schedule:
    # Run every hour on weekdays during Taiwan market hours (01:00-09:00 UTC = 09:00-17:00 TST)
    # Also run once overnight to update pre-market data
    - cron: '0 1-9 * * 1-5'
    - cron: '0 22 * * 0-4'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data
        run: python scripts/fetch_data.py

      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/market_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update market data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
